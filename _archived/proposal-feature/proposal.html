<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bisnow Proposal Generator</title>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgenjs.bundle.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 12px; padding: 40px; max-width: 500px; width: 90%; box-shadow: 0 4px 24px rgba(0,0,0,0.1); text-align: center; }
    .logo { font-size: 28px; font-weight: 900; color: #F37021; margin-bottom: 8px; letter-spacing: 1px; }
    .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 24px; }
    .company { font-size: 22px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
    .pipeline { font-size: 16px; color: #22c55e; font-weight: 600; margin-bottom: 24px; }
    .btn { display: inline-block; background: linear-gradient(135deg, #F37021, #e05a10); color: #fff; padding: 14px 36px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; border: none; text-decoration: none; transition: transform 0.1s; }
    .btn:hover { transform: scale(1.03); }
    .btn:active { transform: scale(0.98); }
    .status { margin-top: 16px; font-size: 13px; color: #6b7280; }
    .error { color: #ef4444; }
    .products { text-align: left; margin: 16px 0; font-size: 13px; }
    .products table { width: 100%; border-collapse: collapse; }
    .products th { background: #1e293b; color: #fff; padding: 6px 10px; text-align: left; font-size: 12px; }
    .products td { padding: 6px 10px; border-bottom: 1px solid #e5e7eb; }
    .products tr:nth-child(even) { background: #f9fafb; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">BISNOW</div>
    <div class="subtitle">Sponsorship & Marketing Proposal Generator</div>
    <div id="content">
      <p style="color:#6b7280;">Loading proposal data...</p>
    </div>
  </div>

  <script>
    const COLORS = {
      orange: 'F37021', charcoal: '1A1A2E', darkNavy: '0F1923',
      white: 'FFFFFF', darkText: '333333', lightGray: 'F5F5F5',
      medGray: 'E0E0E0', green: '22C55E',
    };

    function addSlideNumber(slide, num, total) {
      slide.addText(num + ' / ' + total, { x: 8.5, y: 5.2, w: 1.2, h: 0.3, fontSize: 9, color: '888888', align: 'right' });
    }

    async function buildProposal(research) {
      const pptx = new PptxGenJS();
      pptx.layout = 'LAYOUT_16x9';
      pptx.author = 'Bisnow';
      pptx.company = 'Bisnow';
      const companyName = research.company?.name || 'Prospect';
      const totalSlides = 9;

      // Slide 1: Cover
      const s1 = pptx.addSlide();
      s1.background = { color: COLORS.charcoal };
      s1.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 10, h: 0.08, fill: { color: COLORS.orange } });
      s1.addText('BISNOW', { x: 0.5, y: 0.4, w: 3, h: 0.6, fontSize: 28, bold: true, color: COLORS.orange, fontFace: 'Arial Black' });
      s1.addText(companyName, { x: 1, y: 1.8, w: 8, h: 1, fontSize: 36, bold: true, color: COLORS.white, fontFace: 'Arial Black', align: 'center' });
      s1.addText('Sponsorship & Marketing Proposal', { x: 1, y: 2.8, w: 8, h: 0.6, fontSize: 20, color: COLORS.orange, fontFace: 'Arial', align: 'center' });
      s1.addText('Prepared for ' + companyName, { x: 1, y: 3.5, w: 8, h: 0.5, fontSize: 14, color: 'AAAAAA', fontFace: 'Arial', align: 'center' });
      const today = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      s1.addText(today + '\nJordan Hinsch | Head of Sales, Florida\njordan.hinsch@bisnow.com', { x: 1, y: 4.4, w: 8, h: 0.9, fontSize: 11, color: '888888', fontFace: 'Arial', align: 'center', lineSpacingMultiple: 1.3 });
      addSlideNumber(s1, 1, totalSlides);

      // Slide 2: About Bisnow
      const s2 = pptx.addSlide();
      s2.background = { color: COLORS.lightGray };
      s2.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 10, h: 0.08, fill: { color: COLORS.orange } });
      s2.addText('About Bisnow', { x: 0.5, y: 0.3, w: 9, h: 0.7, fontSize: 32, bold: true, color: COLORS.charcoal, fontFace: 'Arial Black' });
      s2.addText('The #1 Platform Serving Commercial Real Estate', { x: 0.5, y: 1.0, w: 9, h: 0.4, fontSize: 16, color: COLORS.orange, fontFace: 'Arial', italic: true });
      [['436','Events Annually'],['50+','Markets'],['1.7M','Newsletter Subscribers'],['11M','Annual Website Readers'],['100K+','Event Attendees'],['79','Email Newsletters']].forEach(function(stat, i) {
        var col = i % 3, row = Math.floor(i / 3), x = 0.5 + col * 3.1, y = 1.7 + row * 1.5;
        s2.addShape(pptx.ShapeType.rect, { x: x, y: y, w: 2.8, h: 1.2, fill: { color: COLORS.white }, shadow: { type: 'outer', blur: 4, offset: 2, color: '00000020' }, rectRadius: 0.1 });
        s2.addText(stat[0], { x: x, y: y + 0.1, w: 2.8, h: 0.6, fontSize: 28, bold: true, color: COLORS.orange, fontFace: 'Arial Black', align: 'center' });
        s2.addText(stat[1], { x: x, y: y + 0.65, w: 2.8, h: 0.4, fontSize: 12, color: COLORS.darkText, fontFace: 'Arial', align: 'center' });
      });
      addSlideNumber(s2, 2, totalSlides);

      // Slide 3: Who Attends
      const s3 = pptx.addSlide();
      s3.background = { color: COLORS.white };
      s3.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 10, h: 0.08, fill: { color: COLORS.orange } });
      s3.addText('Who Attends Bisnow Events', { x: 0.5, y: 0.3, w: 9, h: 0.7, fontSize: 32, bold: true, color: COLORS.charcoal, fontFace: 'Arial Black' });
      [{pct:'42%',label:'VP or Above'},{pct:'15%',label:'C-Suite'},{pct:'27%',label:'Owners / Operators / Developers / PE / Lenders'}].forEach(function(s, i) {
        var x = 0.5 + i * 3.1;
        s3.addShape(pptx.ShapeType.rect, { x: x, y: 1.3, w: 2.8, h: 1.4, fill: { color: COLORS.charcoal }, rectRadius: 0.1 });
        s3.addText(s.pct, { x: x, y: 1.4, w: 2.8, h: 0.7, fontSize: 36, bold: true, color: COLORS.orange, fontFace: 'Arial Black', align: 'center' });
        s3.addText(s.label, { x: x + 0.2, y: 2.0, w: 2.4, h: 0.6, fontSize: 11, color: COLORS.white, fontFace: 'Arial', align: 'center', wrap: true });
      });
      if (research.target_audience?.pitch_rationale) {
        s3.addShape(pptx.ShapeType.rect, { x: 0.5, y: 3.1, w: 9, h: 1.2, fill: { color: 'FFF3E8' }, rectRadius: 0.1, line: { color: COLORS.orange, width: 1 } });
        s3.addText('Audience Match for ' + companyName, { x: 0.7, y: 3.2, w: 8.5, h: 0.35, fontSize: 13, bold: true, color: COLORS.orange, fontFace: 'Arial' });
        s3.addText(research.target_audience.pitch_rationale, { x: 0.7, y: 3.55, w: 8.5, h: 0.65, fontSize: 11, color: COLORS.darkText, fontFace: 'Arial', wrap: true });
      }
      addSlideNumber(s3, 3, totalSlides);

      // Slide 4: Recommended Events
      const s4 = pptx.addSlide();
      s4.background = { color: COLORS.lightGray };
      s4.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 10, h: 0.08, fill: { color: COLORS.orange } });
      s4.addText('Recommended Events', { x: 0.5, y: 0.3, w: 9, h: 0.7, fontSize: 32, bold: true, color: COLORS.charcoal, fontFace: 'Arial Black' });
      (research.best_fit_events || []).slice(0, 3).forEach(function(evt, i) {
        var y = 1.3 + i * 1.3;
        s4.addShape(pptx.ShapeType.rect, { x: 0.5, y: y, w: 9, h: 1.1, fill: { color: COLORS.white }, rectRadius: 0.1 });
        s4.addText(evt.event_name, { x: 0.7, y: y + 0.05, w: 5.5, h: 0.4, fontSize: 16, bold: true, color: COLORS.charcoal, fontFace: 'Arial' });
        s4.addText((evt.date||'') + ' | ' + (evt.venue||'') + ' | ' + (evt.market||''), { x: 0.7, y: y + 0.4, w: 5.5, h: 0.3, fontSize: 11, color: '888888', fontFace: 'Arial' });
        s4.addText(evt.why || '', { x: 0.7, y: y + 0.7, w: 8.5, h: 0.3, fontSize: 10, color: COLORS.darkText, fontFace: 'Arial', italic: true });
        s4.addShape(pptx.ShapeType.rect, { x: 7.8, y: y + 0.15, w: 1.5, h: 0.5, fill: { color: COLORS.orange }, rectRadius: 0.25 });
        s4.addText(evt.market || 'FL', { x: 7.8, y: y + 0.15, w: 1.5, h: 0.5, fontSize: 10, bold: true, color: COLORS.white, fontFace: 'Arial', align: 'center' });
      });
      addSlideNumber(s4, 4, totalSlides);

      // Slide 5: Sponsorship Packages
      const s5 = pptx.addSlide();
      s5.background = { color: COLORS.white };
      s5.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 10, h: 0.08, fill: { color: COLORS.orange } });
      s5.addText('Sponsorship Packages', { x: 0.5, y: 0.3, w: 9, h: 0.7, fontSize: 32, bold: true, color: COLORS.charcoal, fontFace: 'Arial Black' });
      var evtProds = (research.recommended_products || []).filter(function(p) { var l = (p.product||'').toLowerCase(); return !l.includes('brief') && !l.includes('email') && !l.includes('article') && !l.includes('banner'); });
      var rows5 = [[{text:'Package',options:{bold:true,color:COLORS.white,fill:{color:COLORS.orange},fontSize:12}},{text:'Price',options:{bold:true,color:COLORS.white,fill:{color:COLORS.orange},fontSize:12}},{text:'Rationale',options:{bold:true,color:COLORS.white,fill:{color:COLORS.orange},fontSize:12}}]];
      evtProds.forEach(function(p,i) { rows5.push([{text:p.product||'',options:{fontSize:11,fill:{color:i%2===0?COLORS.lightGray:COLORS.white}}},{text:p.price||'',options:{fontSize:11,fill:{color:i%2===0?COLORS.lightGray:COLORS.white}}},{text:p.rationale||'',options:{fontSize:10,fill:{color:i%2===0?COLORS.lightGray:COLORS.white}}}]); });
      if (rows5.length > 1) s5.addTable(rows5, { x: 0.5, y: 1.2, w: 9, border: { type:'solid',pt:0.5,color:COLORS.medGray }, colW: [3,1.5,4.5], rowH: 0.5 });
      addSlideNumber(s5, 5, totalSlides);

      // Slide 6: Digital Marketing
      const s6 = pptx.addSlide();
      s6.background = { color: COLORS.lightGray };
      s6.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 10, h: 0.08, fill: { color: COLORS.orange } });
      s6.addText('Digital Marketing Add-Ons', { x: 0.5, y: 0.3, w: 9, h: 0.7, fontSize: 32, bold: true, color: COLORS.charcoal, fontFace: 'Arial Black' });
      var digProds = (research.recommended_products || []).filter(function(p) { var l = (p.product||'').toLowerCase(); return l.includes('brief') || l.includes('email') || l.includes('article') || l.includes('banner'); });
      var rows6 = [[{text:'Product',options:{bold:true,color:COLORS.white,fill:{color:COLORS.orange},fontSize:12}},{text:'Price',options:{bold:true,color:COLORS.white,fill:{color:COLORS.orange},fontSize:12}},{text:'Rationale',options:{bold:true,color:COLORS.white,fill:{color:COLORS.orange},fontSize:12}}]];
      digProds.forEach(function(p,i) { rows6.push([{text:p.product||'',options:{fontSize:11,fill:{color:i%2===0?COLORS.lightGray:COLORS.white}}},{text:p.price||'',options:{fontSize:11,fill:{color:i%2===0?COLORS.lightGray:COLORS.white}}},{text:p.rationale||'',options:{fontSize:10,fill:{color:i%2===0?COLORS.lightGray:COLORS.white}}}]); });
      if (rows6.length > 1) s6.addTable(rows6, { x: 0.5, y: 1.2, w: 9, border: { type:'solid',pt:0.5,color:COLORS.medGray }, colW: [3,1.5,4.5], rowH: 0.5 });
      s6.addShape(pptx.ShapeType.rect, { x: 0.5, y: 3.8, w: 9, h: 0.8, fill: { color: COLORS.white }, rectRadius: 0.08 });
      s6.addText('South Florida Morning Brief: 39,000 subscribers  |  Dedicated Email: 33,426 audience  |  24.8% open rate', { x: 0.7, y: 3.9, w: 8.6, h: 0.6, fontSize: 11, color: COLORS.darkText, fontFace: 'Arial', align: 'center' });
      addSlideNumber(s6, 6, totalSlides);

      // Slide 7: Investment Summary
      const s7 = pptx.addSlide();
      s7.background = { color: COLORS.white };
      s7.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 10, h: 0.08, fill: { color: COLORS.orange } });
      s7.addText('Investment Summary', { x: 0.5, y: 0.3, w: 9, h: 0.7, fontSize: 32, bold: true, color: COLORS.charcoal, fontFace: 'Arial Black' });
      var allProds = research.recommended_products || [];
      var total = 0;
      var rows7 = [[{text:'Product',options:{bold:true,color:COLORS.white,fill:{color:COLORS.charcoal},fontSize:12}},{text:'Investment',options:{bold:true,color:COLORS.white,fill:{color:COLORS.charcoal},fontSize:12}}]];
      allProds.forEach(function(p,i) { var n = parseInt((p.price||'0').replace(/[^0-9]/g,''),10); total += n; rows7.push([{text:p.product||'',options:{fontSize:12,fill:{color:i%2===0?COLORS.lightGray:COLORS.white}}},{text:p.price||'',options:{fontSize:12,fill:{color:i%2===0?COLORS.lightGray:COLORS.white},align:'right'}}]); });
      rows7.push([{text:'Total Investment',options:{bold:true,fontSize:14,fill:{color:COLORS.orange},color:COLORS.white}},{text:'$'+total.toLocaleString(),options:{bold:true,fontSize:14,fill:{color:COLORS.orange},color:COLORS.white,align:'right'}}]);
      s7.addTable(rows7, { x: 1.5, y: 1.3, w: 7, border: { type:'solid',pt:0.5,color:COLORS.medGray }, colW: [4.5,2.5], rowH: 0.5 });
      if (total > 15000) s7.addText('Package discount available \u2014 ask Jordan for details', { x: 1.5, y: 4.2, w: 7, h: 0.4, fontSize: 12, italic: true, color: COLORS.orange, fontFace: 'Arial', align: 'center' });
      addSlideNumber(s7, 7, totalSlides);

      // Slide 8: Why Bisnow
      const s8 = pptx.addSlide();
      s8.background = { color: COLORS.charcoal };
      s8.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 10, h: 0.08, fill: { color: COLORS.orange } });
      s8.addText('Why Bisnow', { x: 0.5, y: 0.3, w: 9, h: 0.7, fontSize: 32, bold: true, color: COLORS.white, fontFace: 'Arial Black' });
      ['"I continually choose Bisnow because their content and events are always quality and tie together nicely."','"We made some tremendous new connections and renewed many existing ones."','"Bisnow\'s advertising metrics are the best I\'ve seen for any publication."'].forEach(function(t,i) {
        var y = 1.3 + i * 1.2;
        s8.addShape(pptx.ShapeType.rect, { x: 0.8, y: y, w: 8.4, h: 0.9, fill: { color: '222240' }, rectRadius: 0.08 });
        s8.addText(t, { x: 1.0, y: y + 0.05, w: 8, h: 0.8, fontSize: 13, italic: true, color: COLORS.white, fontFace: 'Arial', wrap: true });
      });
      s8.addShape(pptx.ShapeType.rect, { x: 3, y: 4.6, w: 4, h: 0.5, fill: { color: COLORS.orange }, rectRadius: 0.25 });
      s8.addText('7 NAREE Awards in 2025', { x: 3, y: 4.6, w: 4, h: 0.5, fontSize: 13, bold: true, color: COLORS.white, fontFace: 'Arial', align: 'center' });
      addSlideNumber(s8, 8, totalSlides);

      // Slide 9: Next Steps
      const s9 = pptx.addSlide();
      s9.background = { color: COLORS.lightGray };
      s9.addShape(pptx.ShapeType.rect, { x: 0, y: 0, w: 10, h: 0.08, fill: { color: COLORS.orange } });
      s9.addText('Next Steps', { x: 0.5, y: 0.3, w: 9, h: 0.7, fontSize: 32, bold: true, color: COLORS.charcoal, fontFace: 'Arial Black' });
      var bestEvt = (research.best_fit_events || [])[0]?.event_name || 'our upcoming events';
      s9.addText('Let\'s discuss how to maximize your\nvisibility at ' + bestEvt, { x: 1, y: 1.5, w: 8, h: 1, fontSize: 18, color: COLORS.darkText, fontFace: 'Arial', align: 'center', lineSpacingMultiple: 1.5 });
      s9.addShape(pptx.ShapeType.rect, { x: 2, y: 2.8, w: 6, h: 2, fill: { color: COLORS.white }, rectRadius: 0.1, shadow: { type: 'outer', blur: 4, offset: 2, color: '00000020' } });
      s9.addText('Jordan Hinsch', { x: 2.2, y: 2.95, w: 5.6, h: 0.45, fontSize: 20, bold: true, color: COLORS.charcoal, fontFace: 'Arial', align: 'center' });
      s9.addText('Head of Sales, Florida', { x: 2.2, y: 3.35, w: 5.6, h: 0.35, fontSize: 14, color: COLORS.orange, fontFace: 'Arial', align: 'center' });
      s9.addText('jordan.hinsch@bisnow.com', { x: 2.2, y: 3.75, w: 5.6, h: 0.35, fontSize: 13, color: COLORS.darkText, fontFace: 'Arial', align: 'center' });
      s9.addText('BISNOW', { x: 3.5, y: 4.8, w: 3, h: 0.5, fontSize: 22, bold: true, color: COLORS.orange, fontFace: 'Arial Black', align: 'center' });
      addSlideNumber(s9, 9, totalSlides);

      var fileName = 'Bisnow_Proposal_' + companyName.replace(/[^a-zA-Z0-9]/g, '_') + '_' + new Date().toISOString().split('T')[0] + '.pptx';
      await pptx.writeFile({ fileName: fileName });
      return fileName;
    }

    // Main
    (function() {
      var content = document.getElementById('content');
      var hash = window.location.hash.slice(1);
      if (!hash) {
        content.innerHTML = '<p class="error">No proposal data found in URL. This link may have expired or been truncated.</p>';
        return;
      }
      try {
        var json = decodeURIComponent(atob(hash));
        var research = JSON.parse(json);
        var companyName = research.company?.name || 'Prospect';
        var products = research.recommended_products || [];
        var total = products.reduce(function(sum, p) { return sum + (parseInt((p.price||'0').replace(/[^0-9]/g,''),10) || 0); }, 0);

        var productHtml = '<table><thead><tr><th>Product</th><th>Price</th></tr></thead><tbody>';
        products.forEach(function(p) {
          productHtml += '<tr><td>' + (p.product||'') + '</td><td><strong>' + (p.price||'') + '</strong></td></tr>';
        });
        productHtml += '</tbody></table>';

        content.innerHTML =
          '<div class="company">' + companyName + '</div>' +
          '<div class="pipeline">Pipeline: $' + total.toLocaleString() + '</div>' +
          '<div class="products">' + productHtml + '</div>' +
          '<button class="btn" onclick="handleGenerate()">Download Proposal (.pptx)</button>' +
          '<div class="status" id="status"></div>';

        window._research = research;
      } catch (e) {
        content.innerHTML = '<p class="error">Failed to decode proposal data: ' + e.message + '</p>';
      }
    })();

    async function handleGenerate() {
      var status = document.getElementById('status');
      status.textContent = 'Generating 9-slide proposal...';
      try {
        var fileName = await buildProposal(window._research);
        status.textContent = 'Downloaded: ' + fileName;
      } catch (e) {
        status.innerHTML = '<span class="error">Error: ' + e.message + '</span>';
      }
    }
  </script>
</body>
</html>
